<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DiagnoSure Premium</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0066CC; --primary-dark: #0052A3;
            --text: #1A1A1A; --text-light: #666666;
            --bg: #FFFFFF; --bg-secondary: #F8F9FA;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, #E6F2FF 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            color: var(--text); padding: 20px;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            border-radius: 24px; padding: 40px; width: 100%; max-width: 450px;
            box-shadow: 0 10px 40px rgba(0, 102, 204, 0.1); border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }
        .logo {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 30px;
            text-decoration: none;
        }
        h2 { font-size: 24px; margin-bottom: 8px; }
        p.subtitle { color: var(--text-light); margin-bottom: 30px; font-size: 15px; }
        
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        .form-group input {
            width: 100%; padding: 14px 16px; border: 2px solid #E9ECEF; border-radius: 12px;
            font-size: 16px; transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0, 102, 204, 0.1);
        }
        
        .btn {
            width: 100%; padding: 16px; background: var(--primary); color: white;
            border: none; border-radius: 12px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.3s; margin-top: 10px;
        }
        .btn:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0, 102, 204, 0.2); }
        
        .footer-links { margin-top: 24px; font-size: 14px; color: var(--text-light); }
        .footer-links a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .footer-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="auth-card">
    <a href="diagnosure_final.html" class="logo">
        <svg width="42" height="42" viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="30" fill="#0066CC"/>
            <path d="M32 14v36M14 32h36" stroke="white" stroke-width="4"/>
            <path d="M16 44h8l4-10 6 14 4-8h10" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
        </svg>
        <span>DiagnoSure</span>
    </a>
    <h2>Welcome Back</h2>
    <p class="subtitle">Log in to continue to your health dashboard</p>
    
    <form id="loginForm">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn">Log In</button>
    </form>
    
    <div class="footer-links">
        Don't have an account? <a href="register.html">Register here</a>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = this.querySelector('.btn');
        const originalText = btn.innerHTML;
        btn.innerHTML = "Authenticating...";
        btn.disabled = true;

        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        try {
            const response = await fetch('http://127.0.0.1:8000/api/login/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            });

            const data = await response.json();

            if (!response.ok) {
                alert(data.error || "Login failed. Please check your credentials.");
                btn.innerHTML = originalText;
                btn.disabled = false;
                return;
            }

            // Success
            localStorage.setItem("userLoggedIn", "true");
            // data.user comes from login_user API
            localStorage.setItem("userData", JSON.stringify(data.user)); 
            window.location.href = "dashboard.html";

        } catch (error) {
            console.error("Error connecting to server:", error);
            alert("Network error. Is the backend running?");
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
