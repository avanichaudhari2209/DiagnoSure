<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - DiagnoSure Premium</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0066CC; --primary-dark: #0052A3;
            --text: #1A1A1A; --text-light: #666666;
            --bg: #FFFFFF; --bg-secondary: #F8F9FA;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, #E6F2FF 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            color: var(--text); padding: 20px;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            border-radius: 24px; padding: 40px; width: 100%; max-width: 450px;
            box-shadow: 0 10px 40px rgba(0, 102, 204, 0.1); border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }
        .logo {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 30px;
            text-decoration: none;
        }
        h2 { font-size: 24px; margin-bottom: 8px; }
        p.subtitle { color: var(--text-light); margin-bottom: 30px; font-size: 15px; }
        
        .form-row { display: flex; gap: 12px; }
        .form-group { text-align: left; margin-bottom: 20px; flex: 1; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        .form-group input {
            width: 100%; padding: 14px 16px; border: 2px solid #E9ECEF; border-radius: 12px;
            font-size: 16px; transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0, 102, 204, 0.1);
        }
        
        .btn {
            width: 100%; padding: 16px; background: var(--primary); color: white;
            border: none; border-radius: 12px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.3s; margin-top: 10px;
        }
        .btn:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0, 102, 204, 0.2); }
        
        .footer-links { margin-top: 24px; font-size: 14px; color: var(--text-light); }
        .footer-links a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .footer-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="auth-card">
    <a href="diagnosure_final.html" class="logo">
        <svg width="42" height="42" viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="30" fill="#0066CC"/>
            <path d="M32 14v36M14 32h36" stroke="white" stroke-width="4"/>
            <path d="M16 44h8l4-10 6 14 4-8h10" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
        </svg>
        <span>DiagnoSure</span>
    </a>
    <h2>Create an Account</h2>
    <p class="subtitle">Join DiagnoSure for unlimited health insights</p>
    
    <form id="registerForm">
        <div class="form-row">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" id="regFirstName" placeholder="John" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="regLastName" placeholder="Doe" required>
            </div>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="regEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="regPassword" placeholder="Create a password" required>
        </div>
        <button type="submit" class="btn">Register</button>
    </form>
    
    <div class="footer-links">
        Already have an account? <a href="login.html">Log in here</a>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = this.querySelector('.btn');
        const originalText = btn.innerHTML;
        btn.innerHTML = "Creating Account...";
        btn.disabled = true;

        const firstName = document.getElementById('regFirstName').value;
        const lastName = document.getElementById('regLastName').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;

        try {
            const response = await fetch('http://127.0.0.1:8000/api/user/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: firstName + " " + lastName,
                    email: email,
                    password: password,
                    age: 0,
                    gender: "Other"
                })
            });

            const data = await response.json();

            if (!response.ok) {
                // If it's a 400 validation error for duplicate email, backend returns e.g. {"email":["user with this email already exists."]}
                if (data.email) {
                    alert("Registration failed: " + data.email[0]);
                } else {
                    alert("Registration failed. Please check your data.");
                }
                btn.innerHTML = originalText;
                btn.disabled = false;
                return;
            }

            // Success
            alert("Registration successful! Please log in to continue.");
            window.location.href = "login.html";

        } catch (error) {
            console.error("Error connecting to server:", error);
            alert("Network error. Is the backend running?");
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
